<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f4f4f4; margin: 0; padding: 24px;">
  <table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center">
    <table style="max-width: 480px; width: 100%; background: #ffffff; border-radius: 12px; overflow: hidden;">
      <tr><td style="background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 32px; text-align: center;">
        <h1 style="margin: 0; color: #fff; font-size: 20px;">Reset Your Password</h1>
      </td></tr>
      <tr><td style="padding: 24px 32px;">
        <p style="margin: 0 0 16px; font-size: 15px; color: #374151;">Hi {{ user.full_name }},</p>
        <p style="margin: 0 0 24px; font-size: 14px; color: #6b7280;">We received a request to reset your Campus Plug password. Click the button below to set a new one. This link expires in 1 hour.</p>

        <table width="100%" cellpadding="0" cellspacing="0">
          <tr><td align="center">
            <a href="{{ reset_url }}" style="display: inline-block; padding: 12px 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; text-decoration: none; border-radius: 8px; font-size: 14px; font-weight: 500;">Reset Password</a>
          </td></tr>
        </table>

        <p style="margin: 24px 0 0; font-size: 14px; color: #6b7280;">If you didn't request this, you can ignore this email.</p>
        <p style="margin: 24px 0 0; font-size: 12px; color: #9ca3af; text-align: center;">Campus Plug — Student Marketplace</p>
      </td></tr>
    </table>
  </td></tr></table>
</body>
</html>
